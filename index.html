<!DOCTYPE html>
<html>
<head>
    <title>My Finance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h2>รายการบัตรเครดิต</h2>
    <table id="financeTable">
        <thead>
            <tr id="headerRow"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwB8Z6RtrKQ5OHT8P5yYfN-zRLYEVgl8G4TAfrJCToaWJhJZS8ECmHCXV-Qwv91hY0g/exec"; // URL ที่ได้จากขั้นตอน Deploy ใน Apps Script
        
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    // สร้างหัวตารางอัตโนมัติ
                    const keys = Object.keys(data[0]);
                    const headerRow = document.getElementById('headerRow');
                    keys.forEach(key => headerRow.innerHTML += `<th>${key}</th>`);
                    
                    // ใส่ข้อมูล
                    const body = document.getElementById('tableBody');
                    data.forEach(item => {
                        let row = "<tr>";
                        keys.forEach(key => row += `<td>${item[key] || '-'}</td>`);
                        row += "</tr>";
                        body.innerHTML += row;
                    });
                }
            });
    </script>
</body>
</html>
