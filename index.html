<!DOCTYPE html>
<html>
<head>
    <title>My Finance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        /* จัดตำแหน่งเครื่องมือค้นหาและปุ่ม */
        .controls-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #searchInput { 
            flex: 1; 
            padding: 12px; 
            box-sizing: border-box; 
        }
        /* ปุ่มเปิด/ปิดคอลัมน์ */
        #toggleBtn {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        #toggleBtn:hover {
            background-color: #0056b3;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        
        /* สไตล์พิเศษสำหรับตัวเลขสีแดง */
        .text-danger { color: #d9534f !important; font-weight: bold; }
        
        /* คลาสสำหรับสั่งซ่อนคอลัมน์ */
        .hidden-col { display: none !important; }
    </style>
</head>
<body>
    <h2>รายการบัตรเครดิต</h2>
    
    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="ค้นหาข้อมูล (เช่น ธนาคาร, ชื่อบัตร)...">
        <button id="toggleBtn" onclick="toggleMonths()">แสดงเดือนอื่นย้อนหลัง</button>
    </div>

    <table id="financeTable">
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwB8Z6RtrKQ5OHT8P5yYfN-zRLYEVgl8G4TAfrJCToaWJhJZS8ECmHCXV-Qwv91hY0g/exec";
        let showAllColumns = false; // เริ่มต้น: ซ่อนเดือนอื่น แสดงเฉพาะเดือนล่าสุด
        let targetMonthString = ""; // ตัวแปรเก็บชื่อเดือนล่าสุด เช่น "พค.69"
        
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                console.log("ข้อมูลที่ได้รับจาก Google:", data);
                
                if (!data || data.length === 0) {
                    alert("ไม่พบข้อมูล หรือ API ส่งค่าว่างเปล่ามาครับ");
                    return;
                }

                const keys = Object.keys(data[0]);
                
                // --- ขั้นตอนที่ 1: ค้นหาเดือนล่าสุดแบบแม่นยำ ---
                // ไล่จากคอลัมน์ซ้ายไปขวาเพื่อจับกลุ่มคำ "ยอดค้าง" แล้วตัดคำหาส่วนท้ายของเดือนล่าสุดมาเก็บไว้
                for (let i = 0; i < keys.length; i++) {
                    const keyStr = keys[i].toString().trim();
                    if (keyStr.startsWith("ยอดค้าง")) {
                        // สกัดคำท้ายสุดออกมา เช่น จาก "ยอดค้าง พค.69" -> ได้ "พค.69"
                        const parts = keyStr.split(/\s+/);
                        if (parts.length > 1) {
                            targetMonthString = parts[parts.length - 1]; 
                        }
                    }
                }
                console.log("เดือนล่าสุดที่ตรวจพบเพื่อแสดงผลคือ:", targetMonthString);

                // --- ขั้นตอนที่ 2: สร้างหัวตารางพร้อมจัดระเบียบคลาสซ่อน ---
                const headerRow = document.getElementById('headerRow');
                headerRow.innerHTML = "";
                
                keys.forEach((key) => {
                    const keyStr = key.toString().trim();
                    let className = "";
                    
                    if (isFinanceColumn(keyStr)) {
                        // ถ้าเป็นคอลัมน์ที่เกี่ยวกับเงิน แต่ไม่ใช่เดือนล่าสุด ให้ใส่คลาสซ่อนไว้ก่อน
                        if (!keyStr.includes(targetMonthString)) {
                            className = "class='month-col hidden-col'";
                        } else {
                            className = "class='month-col'";
                        }
                    }
                    headerRow.innerHTML += `<th ${className}>${key}</th>`;
                });
                
                // --- ขั้นตอนที่ 3: ใส่ข้อมูลรายบรรทัด ---
                const body = document.getElementById('tableBody');
                body.innerHTML = "";
                
                data.forEach(item => {
                    let row = "<tr>";
                    keys.forEach((key, index) => {
                        let val = item[key];
                        const keyStr = key.toString().trim();
                        let isNumber = false;
                        
                        // พยายามแปลงเป็นตัวเลขเพื่อจัดรูปแบบทศนิยมและการคอมม่าคั่นเงิน
                        let num = parseFloat(val);
                        if (!isNaN(num) && val !== "" && typeof val !== 'boolean') {
                            isNumber = true;
                            if (index === 0 || index === 1) {
                                // วันตัดยอด และ หมายเหตุ (คอลัมน์แรก ๆ): จัดแบบจำนวนเต็มไม่มีทศนิยมเด็ดขาด
                                val = num.toLocaleString('th-TH', { maximumFractionDigits: 0 });
                            } else {
                                // คอลัมน์การเงินอื่น ๆ: จัดแบบทศนิยม 2 ตำแหน่ง
                                val = num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            }
                        }
                        
                        // จัดกลุ่มคลาสในการซ่อน/แสดงผลให้ตรงกับหัวข้อตาราง
                        let cellClass = "";
                        if (isFinanceColumn(keyStr)) {
                            if (!keyStr.includes(targetMonthString)) {
                                cellClass = "month-col hidden-col";
                            } else {
                                cellClass = "month-col";
                            }
                        }
                        
                        // กรองคำเฉพาะ "ยอดค้าง" และต้องเป็นตัวเลขที่มีมูลค่ามากกว่า 0 เพื่อระบุเป็นสีแดง
                        if (keyStr.startsWith('ยอดค้าง') && isNumber && num > 0) {
                            cellClass += " text-danger";
                        }
                        
                        row += `<td class="${cellClass}">${val || '-'}</td>`;
                    });
                    row += "</tr>";
                    body.innerHTML += row;
                });
            })
            .catch(err => {
                console.error("เกิดข้อผิดพลาด:", err);
                alert("โหลดข้อมูลไม่ได้: " + err);
            });

        // ฟังก์ชันช่วยแยกประเภทคอลัมน์การเงินประจำเดือน
        function isFinanceColumn(keyStr) {
            return keyStr.startsWith('ยอดค้าง') || keyStr.startsWith('ยอดจ่าย') || keyStr.startsWith('ยอดชำระ') || keyStr.startsWith('ยอดคงเหลือ');
        }

        // --- ขั้นตอนที่ 4: สลับการแสดงผลคอลัมน์เดือนอื่นย้อนหลัง ---
        function toggleMonths() {
            showAllColumns = !showAllColumns;
            const btn = document.getElementById('toggleBtn');
            const elements = document.querySelectorAll('.month-col');
            
            elements.forEach(el => {
                const text = el.innerText || el.textContent;
                // ถ้าคอลัมน์ไม่มีคำระบุเดือนปัจจุบัน ให้ประมวลผลการซ่อน/แสดง
                if (!text.includes(targetMonthString)) {
                    if (showAllColumns) {
                        el.classList.remove('hidden-col');
                    } else {
                        el.classList.add('hidden-col');
                    }
                }
            });

            // เปลี่ยนหน้าตาและข้อความของปุ่มตามสถานะการเปิด/ปิดตารางย้อนหลัง
            if (showAllColumns) {
                btn.innerText = "ซ่อนเดือนอื่น";
                btn.style.backgroundColor = "#28a745"; // สลับเป็นสีเขียวเมื่อตารางกางออก
            } else {
                btn.innerText = "แสดงเดือนอื่นย้อนหลัง";
                btn.style.backgroundColor = "#007bff"; // สลับเป็นสีน้ำเงินเมื่อย่อตารางลง
            }
        }

        // ฟังก์ชันสำหรับค้นหา (Search)
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let table = document.getElementById("financeTable");
            let tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let rowText = tr[i].innerText.toUpperCase();
                tr[i].style.display = rowText.indexOf(filter) > -1 ? "" : "none";
            }
        });
    </script>
</body>
</html>
