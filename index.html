<!DOCTYPE html>
<html>
<head>
    <title>My Finance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h2>รายการบัตรเครดิต</h2>
    <input type="text" id="searchInput" placeholder="ค้นหาข้อมูล (เช่น ธนาคาร, ชื่อบัตร)...">

    <table id="financeTable">
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwB8Z6RtrKQ5OHT8P5yYfN-zRLYEVgl8G4TAfrJCToaWJhJZS8ECmHCXV-Qwv91hY0g/exec";
        
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                console.log("ข้อมูลที่ได้รับจาก Google:", data); // ดูใน Console F12 ว่าข้อมูลมาไหม
                
                if (!data || data.length === 0) {
                    alert("ไม่พบข้อมูล หรือ API ส่งค่าว่างเปล่ามาครับ");
                    return;
                }

                const keys = Object.keys(data[0]);
                const headerRow = document.getElementById('headerRow');
                keys.forEach(key => headerRow.innerHTML += `<th>${key}</th>`);
                
                const body = document.getElementById('tableBody');
                body.innerHTML = "";
                
                data.forEach(item => {
                    let row = "<tr>";
                    keys.forEach((key, index) => {
                        let val = item[key];
                        
                        // --- ส่วนแก้ไข: แปลง String เป็น Number ให้แม่นยำขึ้น ---
                        // พยายามแปลงเป็นเลขก่อน (เผื่อมาเป็นข้อความ)
                        let num = parseFloat(val);
                        
                        if (!isNaN(num) && val !== "" && typeof val !== 'boolean') {
                            if (index === 0) {
                                val = num.toLocaleString('th-TH', { maximumFractionDigits: 0 });
                            } else {
                                val = num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            }
                        }
                        
                        row += `<td>${val || '-'}</td>`;
                    });
                    row += "</tr>";
                    body.innerHTML += row;
                });
            })
            .catch(err => {
                console.error("เกิดข้อผิดพลาด:", err);
                alert("โหลดข้อมูลไม่ได้: " + err);
            });

        // ฟังก์ชันค้นหา
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let table = document.getElementById("financeTable");
            let tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let rowText = tr[i].innerText.toUpperCase();
                tr[i].style.display = rowText.indexOf(filter) > -1 ? "" : "none";
            }
        });
    </script>
</body>
</html>
