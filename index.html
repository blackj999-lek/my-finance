<!DOCTYPE html>
<html>
<head>
    <title>My Finance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        /* จัดตำแหน่งเครื่องมือค้นหาและปุ่ม */
        .controls-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #searchInput { 
            flex: 1; 
            padding: 12px; 
            box-sizing: border-box; 
        }
        /* ปุ่มเปิด/ปิดคอลัมน์ */
        #toggleBtn {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        #toggleBtn:hover {
            background-color: #0056b3;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        
        /* สไตล์พิเศษสำหรับตัวเลขสีแดงเฉพาะคอลัมน์ยอดค้าง */
        .text-danger { color: #d9534f !important; font-weight: bold; }
        
        /* คลาสสำหรับสั่งซ่อนคอลัมน์ */
        .hidden-col { display: none !important; }
    </style>
</head>
<body>
    <h2>รายการบัตรเครดิต</h2>
    
    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="ค้นหาข้อมูล (เช่น ธนาคาร, ชื่อบัตร)...">
        <button id="toggleBtn" onclick="toggleMonths()">แสดงเดือนอื่นย้อนหลัง</button>
    </div>

    <table id="financeTable">
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwB8Z6RtrKQ5OHT8P5yYfN-zRLYEVgl8G4TAfrJCToaWJhJZS8ECmHCXV-Qwv91hY0g/exec";
        let showAllColumns = false; // เริ่มต้น: ซ่อนเดือนอื่น แสดงเฉพาะเดือนล่าสุด
        
        // กำหนดเดือนปัจจุบันที่ต้องการให้โชว์ตรงนี้ (เปลี่ยนตรงนี้เมื่อขึ้นเดือนใหม่ได้ง่ายๆ ครับ)
        const currentMonth = "พค.69"; 
        
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                console.log("ข้อมูลที่ได้รับจาก Google:", data);
                
                if (!data || data.length === 0) {
                    alert("ไม่พบข้อมูล หรือ API ส่งค่าว่างเปล่ามาครับ");
                    return;
                }

                const keys = Object.keys(data[0]);

                // --- ขั้นตอนที่ 1: สร้างหัวตารางพร้อมจัดกลุ่มคลาสซ่อน ---
                const headerRow = document.getElementById('headerRow');
                headerRow.innerHTML = "";
                
                keys.forEach((key) => {
                    const keyStr = key.toString().trim();
                    let className = "";
                    
                    if (isFinanceColumn(keyStr)) {
                        // ถ้าคอลัมน์เกี่ยวกับเงิน มีคำว่า พค.69 (เช่น "ยอดค้าง พค.69" หรือ "ยอดจ่าย พค.69") ให้แสดงปกติ
                        if (keyStr.includes(currentMonth)) {
                            className = "class='month-col'";
                        } else {
                            // ถ้าเป็นเดือนอื่น ให้ใส่คลาสเพื่อสั่งซ่อนไว้ก่อนทันที
                            className = "class='month-col hidden-col'";
                        }
                    }
                    headerRow.innerHTML += `<th ${className}>${key}</th>`;
                });
                
                // --- ขั้นตอนที่ 2: ใส่ข้อมูลรายบรรทัด ---
                const body = document.getElementById('tableBody');
                body.innerHTML = "";
                
                data.forEach(item => {
                    let row = "<tr>";
                    keys.forEach((key, index) => {
                        let val = item[key];
                        const keyStr = key.toString().trim();
                        let isNumber = false;
                        
                        // พยายามแปลงเป็นตัวเลขเพื่อจัดรูปแบบทศนิยมและการคอมม่าคั่นเงิน
                        let num = parseFloat(val);
                        if (!isNaN(num) && val !== "" && typeof val !== 'boolean') {
                            isNumber = true;
                            if (index === 0 || index === 1) {
                                // วันตัดยอด และ หมายเหตุ: แสดงเป็นเลขจำนวนเต็มไม่มีทศนิยม
                                val = num.toLocaleString('th-TH', { maximumFractionDigits: 0 });
                            } else {
                                // คอลัมน์การเงินอื่น ๆ: แสดงแบบมีทศนิยม 2 ตำแหน่ง
                                val = num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            }
                        }
                        
                        // จัดกลุ่มคลาสซ่อนของเซลล์ข้อมูลให้ตรงกันกับหัวข้อตาราง
                        let cellClass = "";
                        if (isFinanceColumn(keyStr)) {
                            if (keyStr.includes(currentMonth)) {
                                cellClass = "month-col";
                            } else {
                                cellClass = "month-col hidden-col";
                            }
                        }
                        
                        // ใส่สีแดงให้เฉพาะคอลัมน์ที่เป็น "ยอดค้าง" (ไม่เกี่ยวกับ ยอดจ่าย) และยอดมากกว่า 0
                        if (keyStr.startsWith('ยอดค้าง') && isNumber && num > 0) {
                            cellClass += " text-danger";
                        }
                        
                        row += `<td class="${cellClass}">${val || '-'}</td>`;
                    });
                    row += "</tr>";
                    body.innerHTML += row;
                });
            })
            .catch(err => {
                console.error("เกิดข้อผิดพลาด:", err);
                alert("โหลดข้อมูลไม่ได้: " + err);
            });

        // ฟังก์ชันช่วยแยกประเภทคอลัมน์การเงินประจำเดือน
        function isFinanceColumn(keyStr) {
            return keyStr.startsWith('ยอดค้าง') || keyStr.startsWith('ยอดจ่าย') || keyStr.startsWith('ยอดชำระ') || keyStr.startsWith('ยอดคงเหลือ');
        }

        // --- ขั้นตอนที่ 3: สลับการแสดงผลคอลัมน์เดือนอื่นย้อนหลัง ---
        function toggleMonths() {
            showAllColumns = !showAllColumns;
            const btn = document.getElementById('toggleBtn');
            const elements = document.querySelectorAll('.month-col');
            
            elements.forEach(el => {
                const text = el.innerText || el.textContent;
                // สลับซ่อน/แสดง เฉพาะคอลัมน์ที่ไม่ได้อยู่ในเดือนปัจจุบัน (พค.69)
                if (!text.includes(currentMonth) && !el.className.includes(currentMonth)) {
                    if (showAllColumns) {
                        el.classList.remove('hidden-col');
                    } else {
                        el.classList.add('hidden-col');
                    }
                }
            });

            // เปลี่ยนสีปุ่มและข้อความเมื่อมีการสลับโหมด
            if (showAllColumns) {
                btn.innerText = "ซ่อนเดือนอื่น";
                btn.style.backgroundColor = "#28a745"; // สีเขียวเมื่อตารางกางออก
            } else {
                btn.innerText = "แสดงเดือนอื่นย้อนหลัง";
                btn.style.backgroundColor = "#007bff"; // สีน้ำเงินเมื่อหุบตาราง
            }
        }

        // ฟังก์ชันสำหรับค้นหา (Search)
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let table = document.getElementById("financeTable");
            let tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let rowText = tr[i].innerText.toUpperCase();
                tr[i].style.display = rowText.indexOf(filter) > -1 ? "" : "none";
            }
        });
    </script>
</body>
</html>
